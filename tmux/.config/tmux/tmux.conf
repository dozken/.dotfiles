set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# set -ga terminal-overrides ",screen-256color*:Tc"
# set-option -g default-terminal "screen-256color"
#
set-option -g status-style bg=default

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# relaod config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# new panes
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind x kill-pane

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# last session
bind-key -r / switch-client -l

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key -r [ previous-window
bind-key -r ] next-window
set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse



bind-key -r f run-shell "tmux neww $HOME/.config/tmux/scripts/tmux-sessionizer"

# hotkeys for hot projects
bind-key -r D run-shell "$HOME/.config/tmux/scripts/tmux-sessionizer ~/.dotfiles"

# ── Catppuccin Mocha Palette ─────────────────────────────────────────
set -g @thm_bg "#1e1e2e"
set -g @thm_fg "#cdd6f4"
set -g @thm_green "#a6e3a1"
set -g @thm_mauve "#cba6f7"
set -g @thm_overlay_1 "#7f849c"
set -g @thm_overlay_2 "#9399b2"
set -g @thm_surface_0 "#313244"
set -g @thm_surface_1 "#45475a"
set -g @thm_surface_2 "#585b70"

# Window name = "[✳ ]<branch|repo>". The name is the worktree branch (or the
# repo name outside a worktree) — @win_name is set git-accurately per-window
# by the zsh hook (see .zshrc); fallback when no shell has run the hook yet
# strips the "<project>." prefix off the cwd basename (worktree dirs are
# "<project>.<branch>"), else shows the bare basename.
# Prefix ✳ when Claude is the focused pane — its process shows up as a bare
# version number (e.g. 2.1.191), so a leading-digit command means Claude.
set -g automatic-rename-format '#{=/24/…:#{?#{m:[0-9]*,#{pane_current_command}},✳ ,}#{?#{@win_name},#{@win_name},#{?#{m:*.*,#{b:pane_current_path}},#{s|^[^.]*\.||:#{b:pane_current_path}},#{b:pane_current_path}}}}'

# Flag windows that ring bell (Claude waiting / done)
set -g monitor-bell on
set -g visual-bell off
set -g window-status-bell-style 'fg=black,bg=red,bold'

# ── Status line ──────────────────────────────────────────────────────
# Solid bar bg (surface0) so status strip reads separate from Claude text,
# not blended into terminal bg. Every segment keeps bg=#313244 — never
# reset to bg=default or the strip gets holes.
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-justify "left"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[bg=#313244,fg=#a6e3a1,bold]  #S #[fg=#585b70,nobold]│ "
set -g status-right "#[bg=#313244,fg=#7f849c]%Y-%m-%d #[fg=#cdd6f4]%H:%M "

# Flat window tabs — bg matches the strip, current window highlighted via mauve+bold.
# window-status-style colors the separators / inter-tab spacing too — without it
# the gaps between tabs fall back to terminal bg (the holes).
set -g window-status-style "bg=#313244"
set -g window-status-separator "#[bg=#313244,fg=#585b70]│"
set -g window-status-format "#[bg=#313244,fg=#585b70] #I#[fg=#9399b2] #W "
set -g window-status-current-format "#[bg=#45475a] #[fg=#7f849c,nobold]#I#[fg=#cba6f7,bold] #W "
