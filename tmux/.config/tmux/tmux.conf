set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# set -ga terminal-overrides ",screen-256color*:Tc"
# set-option -g default-terminal "screen-256color"
#
set-option -g status-style bg=default

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# relaod config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# new panes
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# last session
bind-key -r / switch-client -l

set -g base-index 0
bind-key -r [ previous-window
bind-key -r ] next-window
set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse



bind-key -r f run-shell "tmux neww $HOME/.config/tmux/scripts/tmux-sessionizer"

# hotkeys for hot projects
bind-key -r D run-shell "$HOME/.config/tmux/scripts/tmux-sessionizer ~/.dotfiles"

# Check and install TPM (Tmux Plugin Manager) if not installed
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-pain-control'
# set -g @plugin 'tmux-plugins/tmux-logging'
# set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ── Catppuccin (v2 API) ──────────────────────────────────────────────
# Pin the version: a floating 'latest' tag changed the API and broke the
# old v0 config (silently ignored vars -> default ugly bar).
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor "mocha"

# windows (tabs) — rounded powerline style, number on the right
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_connect_separator "no"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# ── Status line ──────────────────────────────────────────────────────
# v2 requires assembling modules manually, AFTER the plugin has loaded.
set -g status-style "bg=default"
set -g status-justify "left"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
