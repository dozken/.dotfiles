set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# set -ga terminal-overrides ",screen-256color*:Tc"
# set-option -g default-terminal "screen-256color"
#
set-option -g status-style bg=default

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# relaod config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# new panes
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# last session
bind-key -r / switch-client -l

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key -r [ previous-window
bind-key -r ] next-window
set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse



bind-key -r f run-shell "tmux neww $HOME/.config/tmux/scripts/tmux-sessionizer"

# hotkeys for hot projects
bind-key -r D run-shell "$HOME/.config/tmux/scripts/tmux-sessionizer ~/.dotfiles"

# Check and install TPM (Tmux Plugin Manager) if not installed
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-pain-control'
# set -g @plugin 'tmux-plugins/tmux-logging'
# set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ── Catppuccin (v2 API) ──────────────────────────────────────────────
# Pin the version: a floating 'latest' tag changed the API and broke the
# old v0 config (silently ignored vars -> default ugly bar).
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor "mocha"

# windows (tabs) — flat, no bg boxes, number on the right
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "none"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_fill "none"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_connect_separator "no"

# Name windows from Claude task title (strip leading spinner glyph), not binary (2.1.186)
set -g automatic-rename-format '#{=/20/…:#{s/^[^a-zA-Z0-9]*//:pane_title}}'

# Flag windows that ring bell (Claude waiting / done)
set -g monitor-bell on
set -g visual-bell off
set -g window-status-bell-style 'fg=black,bg=red,bold'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# ── Status line ──────────────────────────────────────────────────────
# v2 requires assembling modules manually, AFTER the plugin has loaded.
# Solid bar bg (surface0) so status strip reads separate from Claude text,
# not blended into terminal bg. Every segment keeps bg=#313244 — never
# reset to bg=default or the strip gets holes.
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-justify "left"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[bg=#313244,fg=#a6e3a1,bold]  #S #[fg=#585b70,nobold]│ "
set -g status-right "#[bg=#313244,fg=#7f849c]%Y-%m-%d #[fg=#cdd6f4]%H:%M "

# Flat window tabs — bg matches the strip, current window highlighted via mauve+bold.
# window-status-style colors the separators / inter-tab spacing too — without it
# the gaps between tabs fall back to terminal bg (the holes).
set -g window-status-style "bg=#313244"
set -g window-status-separator "#[bg=#313244,fg=#585b70]│"
set -g window-status-format "#[bg=#313244,fg=#9399b2] #I #W "
set -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold,underscore] #I #W "
